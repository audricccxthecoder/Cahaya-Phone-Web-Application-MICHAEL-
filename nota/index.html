<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nota Pembelian - Cahaya Phone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #F5F3F0;
            color: #1A1412;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 24px 16px;
        }
        .nota-container {
            background: #fff;
            border-radius: 16px;
            max-width: 520px;
            width: 100%;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        /* Header */
        .nota-header {
            background: linear-gradient(135deg, #B91C1C 0%, #8B0000 100%);
            color: #fff;
            padding: 28px 24px;
            text-align: center;
        }
        .nota-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .nota-header p {
            font-size: 12px;
            opacity: 0.8;
        }

        /* Invoice meta */
        .nota-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 20px 24px;
            background: #FAFAF8;
            border-bottom: 1px solid #EDE8E3;
        }
        .meta-item label {
            font-size: 11px;
            color: #8C8078;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }
        .meta-item span {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #1A1412;
            margin-top: 2px;
        }

        /* Items table */
        .nota-items {
            padding: 20px 24px;
        }
        .nota-items h3 {
            font-size: 13px;
            color: #8C8078;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            font-weight: 600;
        }
        .item-table {
            width: 100%;
            border-collapse: collapse;
        }
        .item-table th {
            font-size: 11px;
            color: #8C8078;
            text-transform: uppercase;
            font-weight: 600;
            padding: 8px 0;
            border-bottom: 2px solid #EDE8E3;
            text-align: left;
        }
        .item-table th:last-child,
        .item-table td:last-child { text-align: right; }
        .item-table th:nth-child(2),
        .item-table td:nth-child(2) { text-align: center; }
        .item-table td {
            padding: 12px 0;
            border-bottom: 1px solid #F5F3F0;
            font-size: 14px;
        }
        .item-name { font-weight: 600; }

        /* Totals */
        .nota-totals {
            padding: 0 24px 20px;
        }
        .total-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 14px;
            color: #5C534B;
        }
        .total-row.diskon { color: #16A34A; }
        .total-row.grand {
            border-top: 2px solid #1A1412;
            margin-top: 8px;
            padding-top: 12px;
            font-size: 18px;
            font-weight: 700;
            color: #B91C1C;
        }

        /* Payment info */
        .nota-payment {
            padding: 16px 24px;
            background: #FAFAF8;
            border-top: 1px solid #EDE8E3;
        }
        .payment-badge {
            display: inline-block;
            background: rgba(185,28,28,0.08);
            color: #B91C1C;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
        }

        /* Note */
        .nota-note {
            padding: 16px 24px;
            border-top: 1px solid #EDE8E3;
            font-size: 13px;
            color: #5C534B;
            font-style: italic;
        }

        /* Footer */
        .nota-footer {
            padding: 20px 24px;
            text-align: center;
            border-top: 1px solid #EDE8E3;
        }
        .nota-footer p {
            font-size: 12px;
            color: #8C8078;
            line-height: 1.6;
        }
        .nota-footer .thanks {
            font-size: 14px;
            font-weight: 600;
            color: #B91C1C;
            margin-bottom: 6px;
        }

        /* Loading & Error */
        .loading, .error {
            text-align: center;
            padding: 60px 24px;
        }
        .loading { color: #8C8078; }
        .error { color: #B91C1C; }
        .error h2 { margin-bottom: 8px; }

        @media print {
            body { background: #fff; padding: 0; }
            .nota-container { box-shadow: none; border-radius: 0; }
        }
    </style>
</head>
<body>
    <div class="nota-container" id="notaContainer">
        <div class="loading" id="loadingState">
            <p>Memuat nota...</p>
        </div>
    </div>

    <script src="/config.js"></script>
    <script>
        const API_URL = API_BASE_URL + '/api';

        function formatRp(val) {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(val || 0);
        }

        function formatDate(dateStr) {
            return new Date(dateStr).toLocaleDateString('id-ID', {
                day: 'numeric', month: 'long', year: 'numeric'
            });
        }

        async function loadNota() {
            // Get token from URL: /nota/?t=TOKEN or /nota/index.html?t=TOKEN
            const params = new URLSearchParams(window.location.search);
            const token = params.get('t');

            if (!token) {
                showError('Link tidak valid', 'Token nota tidak ditemukan di URL.');
                return;
            }

            try {
                const res = await fetch(`${API_URL}/nota/${token}`);
                const data = await res.json();

                if (!data.success) {
                    showError('Nota tidak ditemukan', 'Link mungkin sudah kadaluarsa atau salah.');
                    return;
                }

                renderNota(data.data);
            } catch (e) {
                showError('Gagal memuat', 'Terjadi kesalahan saat memuat nota.');
            }
        }

        function showError(title, msg) {
            document.getElementById('notaContainer').innerHTML = `
                <div class="error">
                    <h2>${title}</h2>
                    <p>${msg}</p>
                </div>
            `;
        }

        function renderNota(nota) {
            const items = typeof nota.items === 'string' ? JSON.parse(nota.items) : nota.items;

            let itemsHtml = '';
            items.forEach(item => {
                const subtotal = (Number(item.harga) || 0) * (Number(item.qty) || 1);
                itemsHtml += `
                    <tr>
                        <td class="item-name">${item.nama || '-'}</td>
                        <td>${item.qty || 1}</td>
                        <td>${formatRp(subtotal)}</td>
                    </tr>
                `;
            });

            let diskonHtml = '';
            if (Number(nota.diskon) > 0) {
                diskonHtml = `<div class="total-row diskon"><span>Diskon</span><span>- ${formatRp(nota.diskon)}</span></div>`;
            }

            let noteHtml = '';
            if (nota.catatan) {
                noteHtml = `<div class="nota-note">${nota.catatan}</div>`;
            }

            let paymentHtml = '';
            if (nota.metode_pembayaran) {
                paymentHtml = `
                    <div class="nota-payment">
                        <span style="font-size:12px;color:#8C8078;">Metode Pembayaran:</span>
                        <span class="payment-badge">${nota.metode_pembayaran}</span>
                    </div>
                `;
            }

            document.getElementById('notaContainer').innerHTML = `
                <div class="nota-header">
                    <h1>Cahaya Phone</h1>
                    <p>Gorontalo</p>
                </div>

                <div class="nota-meta">
                    <div class="meta-item">
                        <label>No. Nota</label>
                        <span>${nota.invoice_number}</span>
                    </div>
                    <div class="meta-item">
                        <label>Tanggal</label>
                        <span>${formatDate(nota.created_at)}</span>
                    </div>
                    <div class="meta-item">
                        <label>Customer</label>
                        <span>${nota.nama_lengkap}</span>
                    </div>
                    <div class="meta-item">
                        <label>WhatsApp</label>
                        <span>${nota.whatsapp}</span>
                    </div>
                </div>

                <div class="nota-items">
                    <h3>Detail Pembelian</h3>
                    <table class="item-table">
                        <thead>
                            <tr>
                                <th>Produk</th>
                                <th>Qty</th>
                                <th>Harga</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${itemsHtml}
                        </tbody>
                    </table>
                </div>

                <div class="nota-totals">
                    <div class="total-row"><span>Subtotal</span><span>${formatRp(nota.subtotal)}</span></div>
                    ${diskonHtml}
                    <div class="total-row grand"><span>Total</span><span>${formatRp(nota.total)}</span></div>
                </div>

                ${paymentHtml}
                ${noteHtml}

                <div class="nota-footer">
                    <p class="thanks">Terima kasih telah berbelanja!</p>
                    <p>Cahaya Phone Gorontalo<br>Simpan nota ini sebagai bukti pembelian</p>
                </div>
            `;

            document.title = `Nota ${nota.invoice_number} - Cahaya Phone`;
        }

        loadNota();
    </script>
</body>
</html>
