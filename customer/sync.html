<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sync Kontak — Cahaya Phone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:#F8F6F3;min-height:100vh;padding:20px 16px}
        .container{max-width:480px;margin:0 auto}

        /* Header card */
        .card{
            background:#fff;border-radius:20px;border:1px solid #EDE8E3;
            padding:36px 28px;text-align:center;
            box-shadow:0 10px 40px rgba(0,0,0,0.05);
            position:relative;overflow:hidden;margin-bottom:16px;
        }
        .card::before{
            content:'';position:absolute;top:0;left:0;right:0;height:3px;
            background:linear-gradient(90deg,#8B0000,#DC2626,#C9A84C,#DC2626,#8B0000);
        }
        .icon{
            width:56px;height:56px;border-radius:50%;
            background:rgba(185,28,28,0.06);border:1px solid rgba(185,28,28,0.15);
            display:flex;align-items:center;justify-content:center;margin:0 auto 20px;
        }
        .icon svg{stroke:#B91C1C}
        h1{font-family:'Playfair Display',serif;font-size:22px;font-weight:400;color:#1A1412;margin-bottom:6px}
        .subtitle{color:#9A918A;font-size:12px;margin-bottom:24px;line-height:1.5}

        /* Quick buttons */
        .quick-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px}
        .btn{
            display:block;width:100%;padding:14px 12px;
            background:linear-gradient(145deg,#B91C1C,#8B0000);
            color:#fff;border:none;border-radius:10px;
            font-size:11px;font-weight:600;font-family:'Inter',sans-serif;
            letter-spacing:0.06em;text-transform:uppercase;
            cursor:pointer;transition:all 0.4s cubic-bezier(0.16,1,0.3,1);
            text-decoration:none;text-align:center;
            box-shadow:0 4px 12px rgba(185,28,28,0.2);
        }
        .btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(185,28,28,0.3)}
        .btn-outline{
            background:#fff;color:#B91C1C;
            border:1px solid rgba(185,28,28,0.2);box-shadow:none;
        }
        .btn-outline:hover{background:rgba(185,28,28,0.04);box-shadow:none}
        .btn-sm{padding:10px 14px;font-size:10px;border-radius:8px}
        .btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}

        /* Date picker section */
        .section{
            background:#fff;border-radius:16px;border:1px solid #EDE8E3;
            padding:24px;margin-bottom:16px;
        }
        .section-title{
            font-size:11px;font-weight:600;color:#5C534B;
            letter-spacing:0.1em;text-transform:uppercase;margin-bottom:14px;
        }
        .date-row{display:flex;gap:10px;align-items:center}
        .date-input{
            flex:1;padding:12px 14px;border:1px solid #EDE8E3;border-radius:10px;
            font-size:14px;font-family:'Inter',sans-serif;color:#1A1412;
            background:#F5F3F0;
        }
        .date-input:focus{outline:none;border-color:#B91C1C;background:#fff;box-shadow:0 0 0 3px rgba(185,28,28,0.08)}

        /* Customer list */
        .list{margin-top:16px}
        .list-empty{text-align:center;padding:24px;color:#9A918A;font-size:13px}
        .list-count{font-size:12px;color:#9A918A;margin-bottom:10px}
        .customer-item{
            display:flex;align-items:center;gap:12px;
            padding:14px;border:1px solid #EDE8E3;border-radius:12px;
            margin-bottom:8px;transition:all 0.3s;background:#FAFAF8;
        }
        .customer-item:hover{border-color:#DDD6CE;background:#fff}
        .customer-item.selected{border-color:rgba(185,28,28,0.3);background:rgba(185,28,28,0.03)}
        .customer-check{
            width:20px;height:20px;border-radius:6px;border:1.5px solid #DDD6CE;
            flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;
            transition:all 0.3s;background:#fff;
        }
        .customer-item.selected .customer-check{
            background:linear-gradient(145deg,#B91C1C,#8B0000);border-color:#B91C1C;
        }
        .customer-check svg{opacity:0;stroke:#fff;transition:opacity 0.2s}
        .customer-item.selected .customer-check svg{opacity:1}
        .customer-info{flex:1;min-width:0}
        .customer-name{font-size:14px;font-weight:500;color:#1A1412;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .customer-detail{font-size:11px;color:#9A918A;margin-top:2px}
        .customer-phone{font-size:12px;color:#5C534B;font-weight:500}

        /* Actions bar */
        .actions{
            display:flex;gap:8px;margin-top:14px;
            padding-top:14px;border-top:1px solid #EDE8E3;
        }
        .actions .btn{flex:1}
        .select-all-row{
            display:flex;align-items:center;gap:8px;margin-bottom:10px;
            cursor:pointer;font-size:12px;color:#5C534B;font-weight:500;
        }
        .select-all-row input{accent-color:#B91C1C;width:16px;height:16px}

        /* Status */
        #status{
            text-align:center;margin-top:12px;font-size:12px;color:#16A34A;
            display:none;padding:10px;background:rgba(22,163,74,0.06);
            border-radius:8px;
        }

        /* Info */
        .info{
            padding:14px;background:rgba(185,28,28,0.03);
            border:1px solid rgba(185,28,28,0.1);border-radius:12px;
            font-size:11px;color:#5C534B;line-height:1.6;
        }
        .info strong{color:#B91C1C}
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="card">
            <div class="icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
            </div>
            <h1>Sync Kontak Customer</h1>
            <p class="subtitle">Download kontak customer ke HP supaya nomor tersimpan dan WA tidak detect spam.</p>

            <div class="quick-btns">
                <button class="btn" onclick="syncAll()">Download Semua</button>
                <button class="btn btn-outline" onclick="syncToday()">Hari Ini</button>
            </div>
        </div>

        <!-- Browse by date -->
        <div class="section">
            <div class="section-title">Cari Berdasarkan Tanggal</div>
            <div class="date-row">
                <input type="date" id="datePicker" class="date-input">
                <button class="btn btn-sm" onclick="loadByDate()">Cari</button>
            </div>

            <div id="customerList" class="list">
                <div class="list-empty">Pilih tanggal lalu tap "Cari"</div>
            </div>
        </div>

        <div id="status"></div>

        <!-- Info -->
        <div class="info">
            <strong>Cara pakai:</strong> Tap download → buka file .vcf → "Import semua kontak" → selesai!<br><br>
            <strong>Tips:</strong> Bookmark halaman ini di homescreen HP untuk akses cepat.
        </div>
    </div>

    <script>
        const KEY = 'cahaya-sync-2026';
        const API = '/api/sync';
        let selectedIds = new Set();
        let allCustomerIds = [];

        // Set date picker to today
        document.getElementById('datePicker').value = new Date().toISOString().slice(0, 10);

        function syncAll() {
            window.location.href = `${API}/contacts?key=${KEY}`;
            showStatus('Downloading semua kontak...');
        }

        function syncToday() {
            const today = new Date().toISOString().slice(0, 10);
            window.location.href = `${API}/contacts?key=${KEY}&since=${today}`;
            showStatus('Downloading kontak hari ini...');
        }

        async function loadByDate() {
            const date = document.getElementById('datePicker').value;
            if (!date) return;

            const container = document.getElementById('customerList');
            container.innerHTML = '<div class="list-empty">Memuat...</div>';
            selectedIds.clear();
            allCustomerIds = [];

            try {
                const res = await fetch(`${API}/list?key=${KEY}&date=${date}`);
                const data = await res.json();

                if (!data.success || data.customers.length === 0) {
                    container.innerHTML = '<div class="list-empty">Tidak ada customer di tanggal ini</div>';
                    return;
                }

                allCustomerIds = data.customers.map(c => c.id);

                let html = `
                    <div class="list-count">${data.count} customer ditemukan</div>
                    <label class="select-all-row">
                        <input type="checkbox" id="selectAll" onchange="toggleSelectAll(this.checked)">
                        Pilih Semua
                    </label>
                `;

                data.customers.forEach(c => {
                    const time = new Date(c.created_at).toLocaleTimeString('id-ID', {hour:'2-digit',minute:'2-digit'});
                    const produk = c.merk_unit && c.tipe_unit ? `${c.merk_unit} ${c.tipe_unit}` : '';
                    html += `
                        <div class="customer-item" id="item-${c.id}" onclick="toggleSelect(${c.id})">
                            <div class="customer-check">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="20 6 9 17 4 12"/>
                                </svg>
                            </div>
                            <div class="customer-info">
                                <div class="customer-name">${c.nama_lengkap}</div>
                                <div class="customer-detail">${produk ? produk + ' · ' : ''}${time}</div>
                            </div>
                            <div class="customer-phone">${formatPhone(c.whatsapp)}</div>
                        </div>
                    `;
                });

                html += `
                    <div class="actions">
                        <button class="btn btn-sm" onclick="downloadSelected()" id="dlSelectedBtn" disabled>
                            Download Terpilih (0)
                        </button>
                        <button class="btn btn-sm btn-outline" onclick="downloadDate('${date}')">
                            Download Semua (${data.count})
                        </button>
                    </div>
                `;

                container.innerHTML = html;

            } catch (e) {
                container.innerHTML = '<div class="list-empty">Gagal memuat data</div>';
            }
        }

        function toggleSelect(id) {
            const el = document.getElementById(`item-${id}`);
            if (selectedIds.has(id)) {
                selectedIds.delete(id);
                el.classList.remove('selected');
            } else {
                selectedIds.add(id);
                el.classList.add('selected');
            }
            updateSelectUI();
        }

        function toggleSelectAll(checked) {
            allCustomerIds.forEach(id => {
                const el = document.getElementById(`item-${id}`);
                if (checked) {
                    selectedIds.add(id);
                    el.classList.add('selected');
                } else {
                    selectedIds.delete(id);
                    el.classList.remove('selected');
                }
            });
            updateSelectUI();
        }

        function updateSelectUI() {
            const btn = document.getElementById('dlSelectedBtn');
            if (btn) {
                btn.disabled = selectedIds.size === 0;
                btn.textContent = `Download Terpilih (${selectedIds.size})`;
            }
            const sa = document.getElementById('selectAll');
            if (sa) sa.checked = selectedIds.size === allCustomerIds.length && allCustomerIds.length > 0;
        }

        async function downloadSelected() {
            if (selectedIds.size === 0) return;
            try {
                const res = await fetch(`${API}/contacts/selected`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ key: KEY, ids: Array.from(selectedIds) })
                });
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'cp_contacts_selected.vcf';
                a.click();
                URL.revokeObjectURL(url);
                showStatus(`${selectedIds.size} kontak terdownload!`);
            } catch (e) {
                showStatus('Gagal download');
            }
        }

        function downloadDate(date) {
            window.location.href = `${API}/contacts?key=${KEY}&since=${date}`;
            showStatus('Downloading...');
        }

        function formatPhone(phone) {
            const p = String(phone);
            if (p.startsWith('62') && p.length > 6) {
                return '+62 ' + p.slice(2, 5) + ' ' + p.slice(5, 9) + ' ' + p.slice(9);
            }
            return p;
        }

        function showStatus(msg) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
