<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cahaya Phone — Pendaftaran Customer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Ambient background blobs -->
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div class="bg-glow bg-glow-3"></div>

    <div class="container">
        <!-- Header / Brand -->
        <header class="header">
            <div class="brand-icon">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="5" y="2" width="14" height="20" rx="2" ry="2"/>
                    <line x1="12" y1="18" x2="12.01" y2="18"/>
                </svg>
            </div>
            <h1 class="brand-name">Cahaya Phone</h1>
            <p class="brand-tagline">Form Pendaftaran Customer</p>
            <div class="header-line"></div>
        </header>

        <!-- Alert Message -->
        <div id="alert" class="alert"></div>

        <form id="customerForm">
            <!-- Informasi Customer -->
            <div class="form-section fade-in">
                <div class="section-header">
                    <span class="section-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </span>
                    <h3>Informasi Customer</h3>
                </div>

                <div class="form-group">
                    <label for="nama_lengkap">Nama Lengkap <span class="required">*</span></label>
                    <input type="text" id="nama_lengkap" name="nama_lengkap" required
                           placeholder="Masukkan nama lengkap">
                </div>

                <div class="form-group">
                    <label for="whatsapp">Nomor WhatsApp <span class="required">*</span></label>
                    <div class="input-with-icon">
                        <span class="input-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.625.846 5.059 2.284 7.034L.789 23.492a.5.5 0 00.627.616l4.584-1.208A11.953 11.953 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-2.239 0-4.332-.726-6.033-1.96l-.424-.316-2.732.72.732-2.672-.347-.553A9.963 9.963 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
                        </span>
                        <input type="tel" id="whatsapp" name="whatsapp" required
                               placeholder="08123456789">
                    </div>
                    <small>Format: 08xxxxxxxxxx</small>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="tanggal_lahir">Tanggal Lahir</label>
                        <input type="date" id="tanggal_lahir" name="tanggal_lahir">
                    </div>

                    <div class="form-group">
                        <label for="nama_sales">Nama Sales</label>
                        <input type="text" id="nama_sales" name="nama_sales"
                               placeholder="Nama sales">
                    </div>
                </div>

                <div class="form-group">
                    <label for="alamat">Alamat Lengkap</label>
                    <textarea id="alamat" name="alamat" rows="3"
                              placeholder="Jl. Contoh No. 123, Kota"></textarea>
                </div>
            </div>

            <!-- Informasi Produk -->
            <div class="form-section fade-in">
                <div class="section-header">
                    <span class="section-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                            <line x1="8" y1="21" x2="16" y2="21"/>
                            <line x1="12" y1="17" x2="12" y2="21"/>
                        </svg>
                    </span>
                    <h3>Informasi Produk</h3>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="merk_unit">Merk Unit</label>
                        <select id="merk_unit" name="merk_unit">
                            <option value="">— Pilih Merk —</option>
                            <option value="iPhone">iPhone</option>
                            <option value="Samsung">Samsung</option>
                            <option value="Xiaomi">Xiaomi</option>
                            <option value="Oppo">Oppo</option>
                            <option value="Vivo">Tecno</option>
                            <option value="Realme">Realme</option>
                            <option value="Asus">Huawei</option>
                            <option value="Nokia">Nokia</option>
                            <option value="Lainnya">Lainnya</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="tipe_unit">Tipe Unit</label>
                        <input type="text" id="tipe_unit" name="tipe_unit"
                               placeholder="iPhone 15 Pro Max">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="harga">Harga (Rp)</label>
                        <input type="number" id="harga" name="harga"
                               placeholder="18000000" step="1000">
                    </div>

                    <div class="form-group">
                        <label for="qty">Qty</label>
                        <input type="number" id="qty" name="qty"
                               value="1" min="1">
                    </div>
                </div>
            </div>

            <!-- Informasi Pembayaran -->
            <div class="form-section fade-in">
                <div class="section-header">
                    <span class="section-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/>
                            <line x1="1" y1="10" x2="23" y2="10"/>
                        </svg>
                    </span>
                    <h3>Informasi Pembayaran</h3>
                </div>

                <div class="form-group">
                    <label for="metode_pembayaran">Metode Pembayaran</label>
                    <select id="metode_pembayaran" name="metode_pembayaran">
                        <option value="">— Pilih Metode —</option>
                        <option value="Cash">Paid Cash</option>
                        <option value="Akulaku">Paid Credit — Akulaku</option>
                        <option value="Avanto">Paid Credit — Avanto</option>
                        <option value="FinancePlus">Paid Credit — FinancePlus</option>
                        <option value="HCI">Paid Credit — Home Credit Indonesia</option>
                        <option value="Indodana">Paid Credit — Indodana</option>
                        <option value="KreditPlus">Paid Credit — KreditPlus</option>
                        <option value="Kredivo">Paid Credit — Kredivo</option>
                        <option value="ShopeepayLater">Paid Credit — Shopeepay Later</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="tahu_dari">Tahu Cahaya Phone dari mana?</label>
                    <select id="tahu_dari" name="tahu_dari">
                        <option value="">— Pilih —</option>
                        <option value="Instagram">Instagram</option>
                        <option value="Website">Website</option>
                        <option value="Teman">Teman / Keluarga</option>
                        <option value="Facebook">Facebook</option>
                        <option value="TikTok">TikTok</option>
                        <option value="Lainnya">Lainnya</option>
                    </select>
                </div>
            </div>

            <!-- Opt-in WhatsApp -->
            <div class="form-section opt-in-section fade-in">
                <label class="checkbox-wrapper">
                    <input type="checkbox" id="opted_in" name="opted_in" checked>
                    <span class="checkmark"></span>
                    <span class="checkbox-label">Saya bersedia menerima pesan promo dan ucapan spesial dari <strong>Cahaya Phone</strong> melalui WhatsApp.</span>
                </label>
            </div>

            <button type="submit" id="submitBtn" class="submit-btn fade-in">
                <span class="btn-text">Kirim Data Customer</span>
                <span class="btn-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </span>
            </button>
        </form>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2026 Cahaya Phone. All rights reserved.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
